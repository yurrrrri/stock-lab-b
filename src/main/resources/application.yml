spring:
  profiles:
    # local: committed defaults + docker-compose (see application-local.yml)
    # key:   optional secrets in gitignored application-key.yml (see application-key.example.yml)
    active: local

  application:
    name: stock-lab
  
  # Java 21+ Virtual Threads Activation
  threads:
    virtual:
      enabled: true
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true

  # Redis Configuration (Reactive)
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 100
          max-idle: 50

  # Kafka (Spring Cloud Stream)
  cloud:
    function:
      definition: consumeOrder
    stream:
      default:
        content-type: application/json
      kafka:
        binder:
          brokers: localhost:9092
          auto-create-topics: true
          min-partition-count: 8
          configuration:
            spring.json.trusted.packages: com.stocklab.core.domain.order.event
        bindings:
          orders-out-0:
            producer:
              configuration:
                acks: all
          consumeOrder-in-0:
            consumer:
              configuration:
                isolation.level: read_committed
      bindings:
        orders-out-0:
          destination: order-topic
          producer:
            partition-count: 8
        consumeOrder-in-0:
          destination: order-topic
          group: matching-engine-group
          consumer:
            concurrency: 1
            max-attempts: 3

server:
  port: 8080
  tomcat:
    # Virtual Threads optimize the worker threads, but we can still tune the acceptor/poller
    threads:
      max: 200 # Virtual threads handle the actual work, so we don't need a massive thread pool here
    mbeanregistry:
      enabled: true

# Monitoring for High-Performance
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
